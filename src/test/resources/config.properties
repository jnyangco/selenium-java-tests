# Browser Configuration
browser=chrome
headless=false
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Application URLs
base.url=https://example.com
staging.url=https://staging.example.com
dev.url=https://dev.example.com

# Test Data
test.data.file=src/test/resources/testdata/testdata.json

# Screenshot Configuration
take.screenshot.on.failure=true
screenshot.path=test-output/screenshots/

# Report Configuration
extent.report.path=test-output/reports/
extent.report.name=AutomationReport.html

# Grid Configuration (if using Selenium Grid)
grid.enabled=false
grid.hub.url=http://localhost:4444/wd/hub

# Database Configuration (if needed)
db.url=jdbc:mysql://localhost:3306/testdb
db.username=testuser
db.password=testpass